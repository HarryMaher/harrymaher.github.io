<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="FART PANTS — VOC sensor overalls with alert lights">
  <rect width="400" height="240" fill="#0a0a12"/>
  <rect x="8" y="8" width="384" height="224" fill="none" stroke="#39ff14" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="200" y="36" fill="#ff6600" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">FART PANTS</text>
  <text x="200" y="56" fill="#00ffff" font-family="monospace" font-size="9" text-anchor="middle">FLATULENCE AUTOMATIC RECOGNITION TOOL</text>
  <text x="200" y="70" fill="#8899aa" font-family="monospace" font-size="8" text-anchor="middle">PUBLIC ALERT NOTIFICATION TELEMETRY</text>
  <!-- overalls -->
  <path d="M125 85 L125 195 Q125 210 145 210 L168 210 L175 145 L225 145 L232 210 L255 210 Q275 210 275 195 L275 85 Z" fill="#3d5a80" stroke="#7df9ff" stroke-width="2"/>
  <rect x="150" y="82" width="100" height="32" rx="3" fill="#5c7a99" stroke="#7df9ff" stroke-width="1"/>
  <!-- bib pocket / sensor -->
  <rect x="172" y="118" width="56" height="40" rx="4" fill="#1a1a2e" stroke="#ffff00" stroke-width="2"/>
  <text x="200" y="135" fill="#39ff14" font-family="monospace" font-size="8" text-anchor="middle">VOC</text>
  <text x="200" y="148" fill="#39ff14" font-family="monospace" font-size="7" text-anchor="middle">SENSOR</text>
  <!-- christmas lights on straps and legs -->
  <circle cx="140" cy="95" r="5" fill="#ff0000"/><circle cx="155" cy="88" r="5" fill="#39ff14"/>
  <circle cx="170" cy="95" r="5" fill="#ffff00"/><circle cx="185" cy="88" r="5" fill="#0066ff"/>
  <circle cx="215" cy="88" r="5" fill="#ff00ff"/><circle cx="230" cy="95" r="5" fill="#ff6600"/>
  <circle cx="245" cy="88" r="5" fill="#39ff14"/><circle cx="260" cy="95" r="5" fill="#ff0000"/>
  <circle cx="138" cy="160" r="4" fill="#ffff00"/><circle cx="138" cy="180" r="4" fill="#ff0000"/>
  <circle cx="262" cy="160" r="4" fill="#39ff14"/><circle cx="262" cy="180" r="4" fill="#0066ff"/>
  <!-- alert glow when triggered -->
  <ellipse cx="200" cy="138" rx="70" ry="50" fill="#ffff00" opacity="0.08"/>
  <text x="200" y="225" fill="#ffff00" font-family="monospace" font-size="9" text-anchor="middle">LIGHTS UP ON DETECTION</text>
</svg>
